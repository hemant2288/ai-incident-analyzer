# Render.com — connect repo and deploy as a Web Service
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ai-incident-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: LLM_MODEL
        value: gpt-4o
